name: Publish to Comfy registry
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"

permissions:
  issues: write

jobs:
  publish-node:
    name: Publish Custom Node to registry
    runs-on: ubuntu-latest
    # REGISTRY_ACCESS_TOKEN is an Environment secret (environment `env`); a job
    # must declare that environment to read it, or the token resolves empty and
    # `comfy node publish --token` fails (see run 28865742308).
    environment: env
    if: ${{ github.repository_owner == 'shanevcantwell' }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
