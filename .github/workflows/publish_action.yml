# Manual-dispatch only by design: publish is an explicit release act, never a
# merge side effect. The required REGISTRY_ACCESS_TOKEN repo secret is
# deliberately absent until reconstruction (see session task ledger /
# next-release reconstruction).
name: Publish to Comfy registry
on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  publish-node:
    name: Publish Custom Node to registry
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'shanevcantwell' }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
